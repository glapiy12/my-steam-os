name: Сборка ISO
on:
  workflow_dispatch: # Запуск вручную кнопкой

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
      id-token: write
    steps:
      - name: Проверка файлов
        uses: actions/checkout@v4

      - name: Генерируем ISO
        uses: blue-build/github-action@v1
        with:
          recipe: 'recipe.yml'
          cli_version: 'v0.9.35'
          # Специальный флаг, который говорит сборщику делать именно ISO-установщик
          build_opts: '--iso'
