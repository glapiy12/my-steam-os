name: Сборка ISO
on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Проверка файлов
        uses: actions/checkout@v4

      - name: Генерируем ISO
        uses: blue-build/github-action@v1
        with:
          recipe: 'recipe.yml'
          cli_version: 'v0.9.35'
          archive: true
          build_opts: '--no-sign'
        # Передаем токен гитхаба для автоматического логина в реестр пакетов
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
