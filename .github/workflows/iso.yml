name: Сборка ISO
on:
  workflow_dispatch: # Позволяет запускать сборку вручную через вкладку Actions

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Проверка файлов
        uses: actions/checkout@v4

      # Авторизуем Docker в GitHub Container Registry на уровне самого раннера
      - name: Логин в GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Генерируем ISO
        uses: blue-build/github-action@v1
        with:
          recipe: 'recipe.yml'
          cli_version: 'v0.9.35'
          archive: true
          build_opts: '--no-sign' # Отключаем подпись, чтобы не искать ключи cosign
        env:
          # Передаем конфигурацию докера и токен внутрь контейнера сборщика
          DOCKER_CONFIG: /home/runner/.docker
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
