name: Сборка ISO
on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Проверка репозитория
        uses: actions/checkout@v4

      - name: Обновление Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Вход в GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Генерируем ISO
        uses: blue-build/github-action@v1
        with:
          recipe: 'recipe.yml'
          cli_version: 'v0.9.35'
          archive: true
          build_opts: '--no-sign'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ISO будет автоматически загружен как артефакт с именем "iso"
