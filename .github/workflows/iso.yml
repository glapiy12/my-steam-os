name: Сборка ISO
on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Проверка файлов
        uses: actions/checkout@v4

      # Чистая генерация файла конфигурации Docker без лишних переносов строк
      - name: Настройка Docker Config
        run: |
          mkdir -p $HOME/.docker
          AUTH_TOKEN=$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64 -w 0)
          cat << EOF > $HOME/.docker/config.json
          {"auths":{"ghcr.io":{"auth":"$AUTH_TOKEN"}}}
          EOF
          
          # Дублируем для рута
          sudo mkdir -p /root/.docker
          sudo cp $HOME/.docker/config.json /root/.docker/config.json

      - name: Генерируем ISO
        uses: blue-build/github-action@v1
        with:
          recipe: 'recipe.yml'
          cli_version: 'v0.9.35'
          archive: true
          build_opts: '--no-sign'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
