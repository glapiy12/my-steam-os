name: Сборка Системы
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Проверка файлов
        uses: actions/checkout@v4

      - name: Собираем ОС
        uses: blue-build/github-action@v1
        with:
          recipe: './recipe.yml' # Добавили точку со слэшем, чтобы он искал в корне
          registry_token: ${{ github.token }}
          cli_version: 'v0.9.35'
          build_opts: '--no-sign'
