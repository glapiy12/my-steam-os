name: Сборка Системы
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Проверка файлов
        uses: actions/checkout@v4

      - name: Собираем ОС
        uses: blue-build/github-action@v1
        with:
          recipe: 'recipe.yml'
          registry_token: ${{ github.token }}
          cli_version: 'v0.9.35'
          # Оставляем только тот параметр, который экшен официально ждет:
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          build_opts: '--skip-validation'
        # Передаем пароль, чтобы утилита могла расшифровать ключ
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
